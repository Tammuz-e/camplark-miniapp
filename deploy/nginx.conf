# 嘢营CAMPLARK - 阿里云 Nginx 配置
# 替换 your_domain.com 为实际域名，或使用服务器 IP

server {
    listen 80;
    server_name your_domain.com;  # 如：camplark.example.com 或 47.xxx.xxx.xxx

    # 后端 API 代理（优先匹配）
    location /api {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 营地管理端（/camp/）
    location /camp/ {
        alias /var/www/camplark/admin-camp/;
        try_files $uri $uri/ /camp/index.html;
    }

    # 平台管理端（根路径）
    location / {
        root /var/www/camplark/admin-platform;
        try_files $uri $uri/ /index.html;
    }
}
